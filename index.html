<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badmixton Flow</title>
  <meta name="description" content="Manage player queue and court assignments during amateur badminton 2x2 sessions. Track scores, auto-suggest teams, sync across devices.">
  <meta name="version" content="v260311-1308">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>
  <link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon-16.png">
  <link rel="icon" type="image/png" sizes="96x96" href="assets/img/favicon-96.png">
  <link rel="apple-touch-icon" href="assets/img/favicon-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="assets/css/styles.css?v=16">
  <script>
    var FIREBASE_CONFIG = {
      apiKey: "AIzaSyDQV3njrl8xcpaC9X9weZknzlx2zzxoD9k",
      databaseURL: "https://badmixton-flow-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "badmixton-flow"
    };
  </script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-K59RH91F29"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-K59RH91F29');
  </script>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="topbar">
    <div class="topbar-left">
      <h1>Badmixton Flow</h1>
    </div>
    <div class="topbar-right">
      <div class="lang-switcher" id="langSwitcher">
        <button class="lang-btn" data-lang="pl" title="Polski"><span class="lang-flag">🇵🇱</span><span class="lang-label">PL</span></button>
        <button class="lang-btn" data-lang="en" title="English"><span class="lang-flag">🇬🇧</span><span class="lang-label">EN</span></button>
      </div>
      <button class="btn-icon" id="btnWakeLock" data-i18n-title="wakeLockTooltip" hidden>&#x2600;</button>
      <button class="btn-icon" id="btnFullscreen" data-i18n-title="fullscreenTooltip">&#x26F6;</button>
      <button class="btn-icon" id="btnHelp" data-i18n-title="helpTooltip">?</button>
      <button class="btn-icon" id="btnToggleMode" data-i18n-title="modeToggleTooltip">
        <span id="modeIcon">&#9881;</span>
      </button>
      <span class="sync-indicator" id="syncIndicator" title="Sync" hidden>&#9679;</span>
    </div>
  </header>

  <!-- ===== NAVIGATION (tabs) ===== -->
  <nav class="tabs" id="tabNav">
    <button class="tab active" data-tab="board" data-i18n="tabBoard">Tablica</button>
    <button class="tab" data-tab="players" data-i18n="tabPlayers">Gracze</button>
    <button class="tab" data-tab="queue" data-i18n="tabQueue">Kolejka</button>
    <button class="tab" data-tab="dashboard" data-i18n="tabSession">Sesja</button>
    <button class="tab" data-tab="courts" data-i18n="tabCourts">Korty</button>
    <button class="tab" data-tab="history" data-i18n="tabHistory">Historia</button>
    <button class="tab" data-tab="results" data-i18n="tabResults">Wyniki</button>
    <button class="tab" data-tab="debug" data-i18n="tabDebug">Debug</button>
  </nav>

  <!-- ===== CONTENT ===== -->
  <main class="content">

    <!-- BOARD (main screen during play) -->
    <section class="panel active" id="panel-board">
      <div class="board-layout">
        <div class="board-courts" id="boardCourts">
          <div class="board-court-card free"><div class="board-court-header"><h2>Kort 1</h2></div><div class="court-empty">&nbsp;</div></div>
          <div class="board-court-card free"><div class="board-court-header"><h2>Kort 2</h2></div><div class="court-empty">&nbsp;</div></div>
          <div class="board-court-card free"><div class="board-court-header"><h2>Kort 3</h2></div><div class="court-empty">&nbsp;</div></div>
          <div class="board-court-card free"><div class="board-court-header"><h2>Kort 4</h2></div><div class="court-empty">&nbsp;</div></div>
        </div>
        <div class="board-queue">
          <h2><span data-i18n="queue">Kolejka</span> <span class="badge" id="boardQueueCount">0</span></h2>
          <div class="board-queue-list" id="boardQueueList"></div>
        </div>
      </div>
    </section>

    <!-- TODAY (dashboard) -->
    <section class="panel" id="panel-dashboard">
      <div class="stats-grid" id="statsGrid"></div>

      <div class="section-block">
        <h2 data-i18n="sessionSettings"></h2>
        <div class="form-row">
          <label for="courtNumbers" data-i18n="courtNumbersLabel"></label>
          <input type="text" id="courtNumbers" placeholder="1,2,3,4" value="1,2,3,4">
          <small data-i18n="courtNumbersHint"></small>
        </div>
        <button class="btn btn-primary" id="btnApplyCourts" data-i18n="applyCourts"></button>
      </div>


      <div class="section-block">
        <h2 data-i18n="syncFirebase"></h2>
        <p class="section-desc" data-i18n="syncDesc"></p>
        <div id="syncSection">
          <div class="form-row">
            <label for="sessionIdInput" data-i18n="sessionIdLabel"></label>
            <div class="session-id-row">
              <input type="text" id="sessionIdInput" placeholder="badminton-2026-03-09">
              <button class="btn btn-secondary btn-sm" id="btnAddSalt" data-i18n-title="addSaltTooltip">&#x1f3b2;</button>
            </div>
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" id="btnCreateSession" data-i18n="createSession"></button>
            <button class="btn btn-secondary" id="btnJoinSession" data-i18n="joinSession"></button>
            <button class="btn btn-danger" id="btnDisconnect" hidden data-i18n="disconnect"></button>
          </div>
          <div id="syncStatus" class="sync-status"></div>
          <div id="syncShareLink" class="sync-share-link" hidden>
            <label for="syncShareUrl" data-i18n="shareLink"></label>
            <div class="share-link-row">
              <input type="text" id="syncShareUrl" readonly>
              <button class="btn btn-secondary btn-sm" id="btnCopyLink" data-i18n="copyLink"></button>
            </div>
          </div>
        </div>
      </div>

      <div class="section-block">
        <h2 data-i18n="actions"></h2>
        <div class="action-list">
          <div class="action-item">
            <button class="btn btn-secondary" id="btnResetToday" data-i18n="resetDay"></button>
            <small data-i18n="resetDayDesc"></small>
          </div>
          <div class="action-item">
            <button class="btn btn-primary" id="btnNewSession" data-i18n="newSession"></button>
            <small data-i18n="newSessionDesc"></small>
          </div>
          <div class="action-item">
            <button class="btn btn-secondary" id="btnExport" data-i18n="exportJSON"></button>
            <small data-i18n="exportDesc"></small>
          </div>
          <div class="action-item">
            <button class="btn btn-secondary" id="btnImport" data-i18n="importJSON"></button>
            <input type="file" id="importFile" accept=".json" hidden>
            <small data-i18n="importDesc"></small>
          </div>
        </div>
      </div>
    </section>

    <!-- PLAYERS -->
    <section class="panel" id="panel-players">
      <div class="add-player-form">
        <input type="text" id="playerNameInput" data-i18n-placeholder="playerNamePlaceholder" autocomplete="off">
        <button class="btn-icon btn-emoji-toggle" id="btnEmojiToggle" data-i18n-title="emojiToggleTooltip">&#x1F43E;</button>
        <button class="btn btn-primary" id="btnAddPlayer" data-i18n="addPlayer"></button>
      </div>
      <div class="emoji-picker" id="emojiPicker" hidden>
        <span class="emoji-hint" id="emojiHint"></span>
        <div class="emoji-chips" id="emojiChips"></div>
      </div>
      <div class="player-list" id="playerList"></div>
      <div class="admin-only" style="text-align:center; padding:12px 0;">
        <button class="btn btn-danger btn-sm" id="btnRemoveAllPlayers" data-i18n="removeAllPlayers"></button>
      </div>
    </section>

    <!-- QUEUE -->
    <section class="panel" id="panel-queue">
      <div class="queue-header">
        <span><span data-i18n="inQueue"></span>: <strong id="queueCount">0</strong></span>
      </div>
      <div class="queue-list" id="queueList"></div>
    </section>

    <!-- COURTS (management) -->
    <section class="panel" id="panel-courts">
      <div class="courts-grid" id="courtsGrid"></div>
    </section>

    <!-- HISTORY -->
    <section class="panel" id="panel-history">
      <div class="history-filters">
        <select id="historyCourtFilter">
          <option value="all" data-i18n="allCourts"></option>
        </select>
        <select id="historyPlayerFilter">
          <option value="all" data-i18n="allPlayers"></option>
        </select>
        <button class="btn btn-danger btn-sm" id="btnUndoLastMatch" data-i18n="undoLastMatch"></button>
      </div>
      <div class="history-list" id="historyList"></div>
    </section>

    <!-- RESULTS -->
    <section class="panel" id="panel-results">
      <div id="resultsContent"></div>
    </section>

    <!-- SYNC -->

    <!-- DEBUG -->
    <section class="panel" id="panel-debug">
      <div class="section-block">
        <h2>App</h2>
        <div id="debugAppInfo" class="debug-info"></div>
      </div>
      <div class="section-block">
        <h2 data-i18n="debugState"></h2>
        <div id="debugStats" class="debug-stats"></div>
      </div>
      <div class="section-block">
        <h2 data-i18n="debugSync"></h2>
        <div id="debugSyncInfo" class="debug-info"></div>
      </div>
      <div class="section-block">
        <h2 data-i18n="debugLocalStorage"></h2>
        <div id="debugStorageInfo" class="debug-info"></div>
        <pre id="debugStateJson" class="debug-json"></pre>
      </div>
      <div class="section-block">
        <h2 data-i18n="debugActions"></h2>
        <div class="btn-row">
          <button class="btn btn-danger" id="btnClearStorage" data-i18n="debugClearStorage"></button>
        </div>
      </div>
    </section>

  </main>

  <!-- ===== MODAL ===== -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" id="modalContent"></div>
  </div>

  <!-- ===== TOASTS ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Firebase SDK (loaded from CDN) -->
  <script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script defer src="assets/js/i18n.js?v=11"></script>
  <script defer src="assets/js/app.js?v=16"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }
  </script>
</body>
</html>
